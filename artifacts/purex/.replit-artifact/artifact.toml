kind = "web"
previewPath = "/"
title = "PureX"
version = "1.0.0"
id = "artifacts/purex"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24257

[services.development]
run = "pnpm --filter @workspace/purex run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/purex", "run", "build" ]
publicDir = "artifacts/purex/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24257"
BASE_PATH = "/"
